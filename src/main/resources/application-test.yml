spring:
  datasource:
    url: jdbc:h2:mem:knowledgeflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

knowledgeflow:
  ai:
    primary-provider: stub
    providers:
      anthropic:
        enabled: false
        api-key: not-used-in-tests
        model: not-used-in-tests
        max-tokens: 1024
      openai:
        enabled: false
        api-key: not-used-in-tests
        model: not-used-in-tests
        max-tokens: 1024
      stub:
        enabled: true
