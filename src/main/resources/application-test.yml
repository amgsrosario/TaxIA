spring:
  datasource:
    url: jdbc:h2:mem:knowledgeflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

knowledgeflow:
  auth:
    bootstrap:
      enabled: true
      secret: test-bootstrap-secret
  ai:
    primary-provider: stub
    providers:
      anthropic:
        enabled: false
        api-key: not-used-in-tests
        model: not-used-in-tests
        max-tokens: 1024
      openai:
        enabled: false
        api-key: not-used-in-tests
        model: not-used-in-tests
        max-tokens: 1024
      stub:
        enabled: true
  grounding:
    enabled: true
    minimum-fragments: 1
    minimum-distinct-sources: 1
    minimum-relevance-score: 0.0
    reject-unsupported-sensitive-claims: true
    skip-provider-when-context-insufficient: true
