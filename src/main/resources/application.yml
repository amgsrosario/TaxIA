spring:
  application:
    name: knowledgeflow-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/knowledgeflow}
    username: ${SPRING_DATASOURCE_USERNAME:knowledgeflow}
    password: ${SPRING_DATASOURCE_PASSWORD:knowledgeflow}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knowledgeflow:
  security:
    jwt:
      issuer: ${KNOWLEDGEFLOW_JWT_ISSUER:knowledgeflow-backend}
      secret: ${KNOWLEDGEFLOW_JWT_SECRET:change-this-development-secret-change-this-development-secret}
      access-token-ttl-minutes: ${KNOWLEDGEFLOW_JWT_ACCESS_TOKEN_TTL_MINUTES:60}
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:1024}
  rag:
    embeddings:
      base-url: ${EMBEDDINGS_SERVICE_URL:http://localhost:8000}
      top-k: ${RAG_TOP_K:5}