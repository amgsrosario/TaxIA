name: knowledgeflow

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowledgeflow
      POSTGRES_USER: knowledgeflow
      POSTGRES_PASSWORD: knowledgeflow
    ports:
      - "15432:5432"
    volumes:
      - knowledgeflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledgeflow -d knowledgeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@knowledgeflow.dev
      PGADMIN_DEFAULT_PASSWORD: knowledgeflow
    ports:
      - "5057:80"
    volumes:
      - knowledgeflow-pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  embeddings:
    build: ./embeddings-service
    environment:
      MODEL_NAME: intfloat/multilingual-e5-base
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  knowledgeflow-postgres-data:
  knowledgeflow-pgadmin-data:
